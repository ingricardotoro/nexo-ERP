name: CI Pipeline

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  # Job 1: Linting y Format Check
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint check
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # Job 2: TypeScript Type Checking
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          DIRECT_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
        run: npm run db:generate

      - name: TypeScript check
        run: npm run typecheck

  # Job 3: Tests Unitarios y de Integración
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    # PostgreSQL service container para tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexoerp_test
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: nexoerp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          DIRECT_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
        run: npm run db:generate

      - name: Ejecutar migraciones Prisma (test DB)
        env:
          DATABASE_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          DIRECT_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
        run: npm run db:migrate:deploy

      - name: Ejecutar tests con Vitest
        env:
          DATABASE_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          DIRECT_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          NODE_ENV: test
        run: npm run test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # Job 4: Build Verification (sin deploy)
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
          DIRECT_URL: postgresql://nexoerp_test:test_password_ci@localhost:5432/nexoerp_test
        run: npm run db:generate

      - name: Build Next.js
        run: npm run build
        env:
          # Variables de entorno mínimas para build
          SKIP_ENV_VALIDATION: true

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
          echo "✅ Build successful"
